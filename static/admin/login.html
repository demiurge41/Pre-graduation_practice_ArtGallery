<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход для сотрудников — Художественная галерея</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="/static/css/artgallery.css?v=8" />
  <style>
    body.staff-login {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 20px;
      background: #f3f3f3;
      font-family: "Montserrat", system-ui, sans-serif;
      font-size: 15px;
      color: #222;
    }

    .staff-login__card {
      width: min(440px, 100%);
      background: #fff;
      padding: 48px 44px 40px;
      border: 1px solid #e2e2e2;
      box-shadow: 0 14px 48px rgba(0, 0, 0, 0.12);
      box-sizing: border-box;
    }

    .staff-login__logo {
      display: block;
      width: fit-content;
      margin: 0 auto 32px;
    }

    .staff-login__card h1 {
      margin: 0 0 36px;
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.02em;
      color: #1a1a1a;
    }

    .staff-login__field {
      margin-bottom: 24px;
    }

    .staff-login__field label {
      display: block;
      margin-bottom: 10px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #555;
    }

    .staff-login__field input {
      display: block;
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d5d5d5;
      border-radius: 2px;
      background: #f8f8f8;
      font: inherit;
      font-size: 15px;
      color: #222;
      box-sizing: border-box;
      transition: border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    .staff-login__field input::placeholder {
      color: #aaa;
    }

    .staff-login__field input:hover {
      border-color: #bbb;
      background: #fff;
    }

    .staff-login__field input:focus {
      outline: none;
      border-color: #c9a86c;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(201, 168, 108, 0.25);
    }

    .staff-login__error {
      margin: 0 0 18px;
      min-height: 0;
      font-size: 14px;
      color: #b02a37;
    }

    .staff-login__error:not(:empty) {
      min-height: 1.2em;
    }

    .staff-login__forgot {
      display: inline-block;
      margin-bottom: 28px;
      font-size: 13px;
      color: #666;
      text-decoration: none;
    }

    .staff-login__forgot:hover {
      color: #c9a86c;
    }

    .staff-login__submit {
      display: block;
      width: 100%;
      padding: 15px 28px;
      border: none;
      border-radius: 2px;
      background: #c9a86c;
      color: #fff;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .staff-login__submit:hover {
      background: #b89558;
    }

    .staff-login__back {
      display: block;
      margin-top: 32px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      text-decoration: none;
    }

    .staff-login__back:hover {
      color: #222;
    }
  </style>
</head>
<body class="staff-login">
  <div class="staff-login__card">
    <div class="ag-logo-box staff-login__logo">
      <div class="ag-logo-box__name">artgallery</div>
      <div class="ag-logo-box__tag">ТВОРЧЕСКОЕ БУДУЩЕЕ</div>
    </div>
    <h1>Портал сотрудников</h1>
    <form id="login-form" novalidate>
      <div class="staff-login__field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="username" placeholder="admin@gallery.local" required />
      </div>
      <div class="staff-login__field">
        <label for="password">Пароль</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="admin123" required />
      </div>
      <p class="staff-login__error form-error" role="alert"></p>
      <a href="#" class="staff-login__forgot">Забыли пароль?</a>
      <button type="submit" class="staff-login__submit">Войти</button>
    </form>
    <a href="/" class="staff-login__back">← На сайт</a>
  </div>
  <script type="module" src="/static/js/admin-login.js"></script>
</body>
</html>
