<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Панель управления галереей</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="/static/css/artgallery.css?v=8" />
  <link rel="stylesheet" href="/static/css/admin-panel.css?v=1" />
</head>
<body class="admin-app">
  <div class="admin-shell">
    <aside class="admin-sidebar" aria-label="Навигация админки">
      <div class="admin-sidebar__brand">
        <div class="ag-logo-box admin-sidebar__logo">
          <div class="ag-logo-box__name">artgallery</div>
          <div class="ag-logo-box__tag">СОТРУДНИКИ</div>
        </div>
      </div>
      <nav class="admin-sidebar__nav">
        <a href="#" data-view="dashboard" class="is-active"><i class="fa-solid fa-chart-pie"></i> Обзор</a>
        <a href="#" data-view="artworks"><i class="fa-solid fa-image"></i> Работы</a>
        <a href="#" data-view="artists"><i class="fa-solid fa-user"></i> Художники</a>
        <a href="#" data-view="exhibitions"><i class="fa-solid fa-calendar-days"></i> Выставки</a>
        <a href="#" data-view="inquiries"><i class="fa-solid fa-envelope"></i> Обращения</a>
      </nav>
      <button type="button" id="logout-btn" class="admin-sidebar__logout"><i class="fa-solid fa-right-from-bracket"></i> Выйти</button>
    </aside>
    <div class="admin-main">
      <header class="admin-topbar">
        <h1 id="view-title">Обзор</h1>
        <span id="user-email" class="admin-topbar__user"></span>
      </header>
      <div id="admin-content" class="admin-content"></div>
    </div>
  </div>

  <div id="entity-modal" class="admin-modal" aria-hidden="true" role="dialog">
    <div class="admin-modal__backdrop" data-close></div>
    <div class="admin-modal__box">
      <button type="button" class="admin-modal__close" data-close aria-label="Закрыть"><i class="fa-solid fa-xmark"></i></button>
      <h2 id="entity-modal-title" class="admin-modal__title">Редактирование</h2>
      <form id="entity-form" class="admin-form"></form>
    </div>
  </div>

  <div id="confirm-modal" class="admin-modal" aria-hidden="true" role="alertdialog">
    <div class="admin-modal__backdrop" data-close></div>
    <div class="admin-modal__box admin-modal__box--sm">
      <h2 class="admin-modal__title">Удалить запись?</h2>
      <p class="admin-modal__text">Это действие нельзя отменить.</p>
      <div class="admin-modal__actions">
        <button type="button" class="admin-btn admin-btn--danger" id="confirm-delete">Удалить</button>
        <button type="button" class="admin-btn admin-btn--ghost" data-close>Отмена</button>
      </div>
    </div>
  </div>

  <script type="module" src="/static/js/admin.js?v=3"></script>
</body>
</html>
