<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events — Art Gallery</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="/static/css/artgallery.css?v=8" />
  <style>
    .events-page {
      padding: 48px 20px 72px;
      background: #f3f3f3;
      min-height: 50vh;
    }

    .events-page__inner {
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
    }

    .ev-list {
      display: flex;
      flex-direction: column;
      gap: 28px;
      margin: 0;
      padding: 0;
    }

    .ev-card {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      width: 100%;
      background: #fff;
      border: 1px solid #e2e2e2;
      border-radius: 2px;
      box-shadow: 0 10px 36px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      transition: box-shadow 0.25s ease, transform 0.25s ease;
    }

    .ev-card:hover {
      box-shadow: 0 14px 44px rgba(0, 0, 0, 0.11);
      transform: translateY(-2px);
    }

    .ev-card__media {
      position: relative;
      flex: 0 0 300px;
      width: 300px;
      min-height: 220px;
      align-self: stretch;
      overflow: hidden;
      background: #e8e8e8;
    }

    .ev-card__media::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.35) 0%, transparent 45%);
      pointer-events: none;
    }

    .ev-card__media img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      max-width: none;
      object-fit: cover;
      object-position: center;
    }

    .ev-badge {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 1;
      padding: 7px 14px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
      border-radius: 2px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
    }

    .ev-badge--current { background: #2d6a4f; }
    .ev-badge--upcoming { background: #c9a86c; }
    .ev-badge--past { background: #5c636a; }

    .ev-card__content {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 28px 36px 28px 32px;
      border-left: 3px solid #c9a86c;
    }

    .ev-card__dates {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.02em;
    }

    .ev-card__dates i {
      color: #c9a86c;
      font-size: 14px;
    }

    .ev-card__title {
      margin: 0 0 14px;
      font-size: 26px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: #1a1a1a;
    }

    .ev-card__text {
      margin: 0 0 22px;
      color: #555;
      line-height: 1.65;
      font-size: 15px;
      max-width: 52ch;
    }

    .ev-card__btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      align-self: flex-start;
      padding: 13px 26px;
      background: #c9a86c;
      color: #fff;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.2s ease, gap 0.2s ease;
    }

    .ev-card__btn i {
      font-size: 11px;
      transition: transform 0.2s ease;
    }

    .ev-card__btn:hover {
      background: #b89558;
      gap: 14px;
    }

    .ev-card__btn:hover i {
      transform: translateX(3px);
    }

    .ev-empty {
      text-align: center;
      color: #666;
      padding: 48px 24px;
      background: #fff;
      border: 1px solid #e2e2e2;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.06);
    }

    .ev-past-notice {
      margin: 20px 0 0;
      padding: 14px 16px;
      background: #f5f5f5;
      border-left: 3px solid #5c636a;
      color: #555;
      font-size: 14px;
      line-height: 1.5;
    }

    #event-modal.ag-modal.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    @media (max-width: 768px) {
      .ev-card {
        flex-direction: column;
      }

      .ev-card__media {
        flex: none;
        width: 100%;
        min-height: 200px;
        height: 220px;
        align-self: auto;
      }

      .ev-card__media img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        max-width: none;
      }

      .ev-card__content {
        border-left: none;
        border-top: 3px solid #c9a86c;
        padding: 24px 22px 26px;
      }

      .ev-card__text {
        max-width: none;
      }
    }
  </style>
</head>
<body class="page-template" data-page="events">
  <div id="ag-header-mount"></div>
  <button type="button" id="ag-menu-toggle" class="ag-mobile-toggle" aria-label="Menu"><i class="fa-solid fa-bars"></i></button>
  <div id="ag-mobile-drawer" class="ag-mobile-drawer" aria-hidden="true">
    <div class="ag-mobile-drawer__panel">
      <a href="/">Home</a><a href="/exhibitions">Events</a>
      <button type="button" data-close-drawer>Close</button>
    </div>
  </div>

  <main class="events-page">
    <div class="events-page__inner">
      <div id="events-list" class="ev-list"></div>
    </div>
  </main>

  <div id="event-modal" class="ag-modal" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="ag-modal__backdrop" data-close></div>
    <div class="ag-modal__box">
      <button type="button" class="ag-modal__close" data-close aria-label="Close">&times;</button>
      <span id="ex-badge" class="ev-badge ev-badge--current">Current</span>
      <h2 id="ex-title"></h2>
      <p id="ex-dates" style="font-weight:600;margin-bottom:12px"></p>
      <p id="ex-desc" style="color:#666;line-height:1.6"></p>
      <p id="ex-past-notice" class="ev-past-notice" hidden>This exhibition has ended. Registration is no longer available.</p>
      <div class="rsvp-form-wrap" style="margin-top:24px">
        <h3 style="font-size:18px;margin-bottom:16px">RSVP / Register</h3>
        <form id="rsvp-form" class="ag-form">
          <div class="form-field"><label>Name</label><input id="rsvp-name" required /></div>
          <div class="form-field"><label>Email</label><input id="rsvp-email" type="email" required /></div>
          <button type="submit" class="ag-btn-tan">Register</button>
        </form>
      </div>
      <div class="rsvp-success" hidden style="margin-top:20px;padding:16px;background:#f0f9f4;border:1px solid #c3e6cb">
        <p><strong>Thank you!</strong> Your registration has been recorded locally.</p>
      </div>
    </div>
  </div>

  <div id="ag-footer-mount"></div>
  <script type="module">
    import { mountTemplateFooter, mountTemplateHeader, initMobileMenu } from "/static/js/template-shell.js?v=5";
    import { initEventsPage } from "/static/js/events-page.js?v=4";

    mountTemplateHeader("exhibitions");
    mountTemplateFooter();
    initMobileMenu();
    await initEventsPage();
  </script>
</body>
</html>
