<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacts — Art Gallery</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="/static/css/artgallery.css?v=8" />
</head>
<body class="page-template" data-page="contacts">
  <div id="ag-header-mount"></div>
  <button type="button" id="ag-menu-toggle" class="ag-mobile-toggle" aria-label="Menu"><i class="fa-solid fa-bars"></i></button>
  <div id="ag-mobile-drawer" class="ag-mobile-drawer" aria-hidden="true">
    <div class="ag-mobile-drawer__panel">
      <a href="/">Home</a><a href="/contacts">Contacts</a>
      <button type="button" data-close-drawer>Close</button>
    </div>
  </div>

  <main class="ag-page">
    <div class="ag-wrap">
      <div class="ag-bottom__grid ag-page-blocks">
        <div class="card-surface location-card">
          <h2 class="section-title">Location</h2>
          <ul class="info-list">
            <li><i class="fa-solid fa-location-dot"></i> Trafalgar Square, London WC2N 5DN</li>
            <li><i class="fa-solid fa-phone"></i> <a href="tel:+18001234567">1-800-1234-567</a></li>
            <li><i class="fa-solid fa-envelope"></i> <a href="mailto:info@artgallery.com">info@artgallery.com</a></li>
          </ul>
          <p class="text-muted">Weekdays: 9:00–20:00 · Weekends: 11:00–18:00</p>
          <div class="ag-map">
            <iframe
              title="Gallery location on map"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              src="https://www.google.com/maps?q=Trafalgar+Square,+London+WC2N+5DN,+United+Kingdom&output=embed"
            ></iframe>
          </div>
        </div>
        <form id="contacts-form" class="card-surface ag-form contact-form-card" novalidate>
          <h2 class="section-title">Contact Form</h2>
          <div class="form-field"><label>Name</label><input name="visitor_name" required /></div>
          <div class="form-field"><label>Email</label><input name="visitor_email" type="email" required /></div>
          <div class="form-field"><label>Message</label><textarea name="message" rows="5" required></textarea></div>
          <p class="ag-form-error form-error" role="alert"></p>
          <button type="submit" class="ag-btn-tan">Send</button>
        </form>
      </div>
    </div>
  </main>

  <div id="ag-footer-mount"></div>
  <script type="module" src="/static/js/site-pages.js?v=4"></script>
</body>
</html>
